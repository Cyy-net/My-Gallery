<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="home">

    <nav class="top-nav">
        <a href="#home" class="nav-item">HOME</a>
        <a href="#gallery-view" class="nav-item">GALLERY</a>
        <a href="#about" class="nav-item">ABOUT</a>
    </nav>

    <div class="side-nav">
        <div class="side-header">Navigation Menu</div>
        <a href="#photos">Photos Section</a>
        <a href="#videos">Videos Section</a>
        <a href="#" class="special-link">Support & FAQ</a>
    </div>

    <div class="container" id="gallery-view">
        <h1 class="main-title">My Gallery</h1>
        
        <h2 id="photos" class="section-title">Photos</h2>
        <div class="row">
            <div class="box">
                <figure>
                    <img src="pic1.jpg" alt="pic1">
                    <figcaption>Glicerene Cruz</figcaption>
                </figure>
            </div>
            <div class="box">
                <figure>
                    <img src="pic3.jpeg" alt="pic3">
                    <figcaption>Alwina Alfabete</figcaption>
                </figure>
            </div>
            <div class="box">
                <figure>
                    <img src="pic2.jpeg" alt="pic2">
                    <figcaption>John Reynalyn Aquino</figcaption>
                </figure> 
            </div>
        </div>

   <h2 id="videos" class="section-title">Videos</h2>
<div class="row">
    <div class="box">
        <figure>
            <video controls preload="metadata">
                <source src="vid1.mp4" type="video/mp4">
            </video>
            <figcaption>Glicerene's vlog</figcaption>
        </figure>
    </div>

    <div class="box">
        <figure>
            <video controls preload="metadata">
                <source src="vid2.mp4" type="video/mp4">
            </video>
            <figcaption>Alwina's vlog</figcaption>
        </figure>
    </div>

    <div class="box">
        <figure>
            <video controls preload="metadata">
                <source src="vid3.mp4" type="video/mp4">
            </video>
            <figcaption>John Reynalyn's vlog</figcaption>
        </figure>
    </div>
</div>
        
    <div id="about" class="about-section">
        <div class="about-container">
            <h2 class="section-title">About Us</h2>
            <div class="group-card">
                <h3>My Group</h3>
                <div class="name-list">
                    <p>Cruz, Glicerene</p>
                    <p>Alfabete, Alwina Nicole</p>
                    <p>Aquino, Johnrey</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; 2026 My Gallery Project. All Rights Reserved.</p>
            <div class="footer-links">
                <a href="#home">Home</a> | 
                <a href="#gallery-view">Gallery</a> | 
                <a href="#about">About</a>
            </div>
        </div>
    </footer>

</body>
</html>
